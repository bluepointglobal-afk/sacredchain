# Reverse proxy for Sacred Knowledge on a single EC2 host.
# - /api        -> backend (Express)
# - /socket.io  -> backend (WebSocket upgrade)
# - everything  -> frontend (Next.js)

upstream sk_backend  { server backend:5000; }
upstream sk_frontend { server frontend:3000; }

server {
    listen 80;
    server_name your-domain.com;

    # ACME challenge for Let's Encrypt / certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # For first boot before TLS is set up, serve the app over HTTP.
    # After running certbot, uncomment the redirect below and use the 443 block.
    # return 301 https://$host$request_uri;

    location /api/ {
        proxy_pass http://sk_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 2m;
    }

    location /socket.io/ {
        proxy_pass http://sk_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://sk_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

