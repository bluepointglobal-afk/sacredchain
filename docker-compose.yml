# Production-style compose for a single AWS EC2 host.
# MongoDB is external (MongoDB Atlas) — set MONGODB_URI in backend/.env.
# Bring up with:  docker compose up -d --build
services:
  backend:
    build: ./backend
    restart: always
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
    expose:
      - '5000'

  frontend:
    build:
      context: ./frontend
      args:
        # Public API URL the browser will call (through nginx).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://your-domain.com/api}
        NEXT_PUBLIC_JITSI_DOMAIN: ${NEXT_PUBLIC_JITSI_DOMAIN:-meet.jit.si}
    restart: always
    expose:
      - '3000'

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
